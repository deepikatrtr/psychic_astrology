name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # change to master if your default branch is master

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Remove duplicate pages artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          run_id="${{ github.run_id }}"
          repository="${{ github.repository }}"
          
          echo "Listing all repository artifacts named 'github-pages'..."
          artifacts_json=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$repository/actions/artifacts?name=github-pages")
          
          echo "Checking for duplicate artifacts from other runs..."
          echo "$artifacts_json" | jq -c '.artifacts[]' | while read -r artifact; do
            art_id=$(echo "$artifact" | jq -r '.id')
            art_run_id=$(echo "$artifact" | jq -r '.workflow_run.id')
            if [ "$art_run_id" != "$run_id" ]; then
              echo "Deleting duplicate artifact id $art_id from run $art_run_id (current run is $run_id)"
              curl -s -X DELETE -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/repos/$repository/actions/artifacts/$art_id"
            fi
          done

          echo "Checking for duplicate artifacts inside the current run..."
          current_run_artifacts=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$repository/actions/runs/$run_id/artifacts")
          
          ids=$(echo "$current_run_artifacts" | jq -r '.artifacts[] | select(.name=="github-pages") | .id')
          count=$(echo "$ids" | wc -w)
          echo "Found $count current run artifact(s) named 'github-pages'."
          
          if [ "$count" -gt 1 ]; then
            first=true
            for id in $ids; do
              if $first; then
                echo "Keeping current run artifact id $id"
                first=false
                continue
              fi
              echo "Deleting duplicate current run artifact id $id"
              curl -s -X DELETE -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/repos/$repository/actions/artifacts/$id"
            done
          fi
        shell: bash

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
